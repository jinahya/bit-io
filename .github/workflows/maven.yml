name: Java CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Java 8 / Maven
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Verify
        run: mvn -B -ntp verify
